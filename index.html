<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lulu’s Beauty Parlour - Expert African hair braiding, knotless braids, box braids, cornrows & more in London. Professional hairstyles with home visits available. Book your appointment today.">
    <meta name="keywords" content="hair braiding London, box braids London, knotless braids, fulani braids, cornrows London, twists and locs, African hair salon London, home visit hairdresser">
    <title>Lulu’s Beauty Parlour | Expert Hair Braiding in London</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #8C5E3B;
            --accent: #C9A227;
        }
        
        .heading-serif {
            font-family: 'Playfair Display', Georgia, serif;
        }

        .luxury-shadow {
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        .hair-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hair-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .nav-link {
            position: relative;
            transition: color 0.2s ease;
        }
        
        .nav-link:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: #8C5E3B;
            transition: width 0.3s ease;
        }
        
        .nav-link:hover:after {
            width: 100%;
        }

        .section-heading {
            position: relative;
            display: inline-block;
        }
        
        .section-heading:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, #8C5E3B, #C9A227);
            border-radius: 3px;
        }

        .modal {
            animation: modalPopIn 0.3s ease forwards;
        }

        @keyframes modalPopIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .beauty-bg {
            background-image: linear-gradient(rgba(63, 42, 30, 0.65), rgba(63, 42, 30, 0.55)), url('https://picsum.photos/id/1005/2000/1200');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .style-img {
            transition: transform 0.5s ease;
        }
        
        .hair-card:hover .style-img {
            transform: scale(1.05);
        }

        .gold-accent {
            color: #C9A227;
        }

        .salon-brown {
            color: #3F2A1E;
        }
    </style>
</head>
<body class="bg-[#FDF8F3] text-[#3F2A1E] font-sans">
    <!-- NAVIGATION -->
    <nav class="bg-white border-b border-[#EDE4D9] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-20">
                <!-- Logo -->
                <div class="flex items-center gap-x-3">
                    <img src="IMG_6118.jpg" alt="Lulu’s Beauty Parlour Logo" class="h-12 w-auto">
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center gap-x-9 text-sm font-medium">
                    <a href="#styles" class="nav-link text-[#3F2A1E] hover:text-[#8C5E3B]">Our Styles</a>
                    <a href="#location" class="nav-link text-[#3F2A1E] hover:text-[#8C5E3B]">Location</a>
                    <a href="#contact" class="nav-link text-[#3F2A1E] hover:text-[#8C5E3B]">Contact</a>
                </div>

                <!-- Right side actions -->
                <div class="flex items-center gap-x-4">
                    <!-- Book Now Button -->
                    <button onclick="openBookingModal()"
                            class="hidden md:block px-6 py-2.5 bg-[#8C5E3B] hover:bg-[#6B4423] text-white text-sm font-semibold rounded-3xl transition-all active:scale-[0.985]">
                        Book Appointment
                    </button>
                    
                    <!-- Mobile Menu Button -->
                    <button id="mobile-menu-btn"
                            class="md:hidden w-11 h-11 flex items-center justify-center text-[#8C5E3B]">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t bg-white px-6 py-6">
            <div class="flex flex-col gap-y-4 text-sm font-medium">
                <a href="#styles" class="py-1 text-[#3F2A1E]">Our Styles</a>
                <a href="#location" class="py-1 text-[#3F2A1E]">Location &amp; Home Visits</a>
                <a href="#contact" class="py-1 text-[#3F2A1E]">Contact Us</a>
                <button onclick="openBookingModal(); document.getElementById('mobile-menu').classList.add('hidden')"
                        class="mt-2 w-full py-3 bg-[#8C5E3B] text-white rounded-3xl font-semibold text-sm">
                    Book Appointment
                </button>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="beauty-bg h-[100dvh] min-h-[640px] flex items-center relative">
        <div class="max-w-5xl mx-auto px-6 pt-12 text-center text-white">
            <div class="inline-flex items-center gap-x-2 bg-white/20 backdrop-blur-md px-4 py-1 rounded-3xl mb-6 text-sm">
                <div class="w-2 h-2 bg-[#C9A227] rounded-full animate-pulse"></div>
                <span class="font-medium tracking-wider text-xs">EST. 2019 • LONDON</span>
            </div>
            
            <h1 class="text-6xl md:text-7xl font-serif tracking-tighter leading-[0.95] mb-4">
                Timeless<br>Braids.<br>Modern You.
            </h1>
            <p class="max-w-md mx-auto text-lg md:text-xl text-white/90 mb-10 tracking-tight">
                Expert African hair braiding in the heart of London.<br>
                Professional. Precise. Beautifully crafted.
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="document.getElementById('styles').scrollIntoView({ behavior: 'smooth' })" 
                        class="px-9 py-4 bg-white text-[#3F2A1E] hover:bg-[#F8F1E9] font-semibold rounded-3xl text-sm tracking-wider transition-all flex items-center justify-center gap-x-3 group">
                    EXPLORE OUR STYLES
                    <i class="fa-solid fa-arrow-right group-active:translate-x-1 transition"></i>
                </button>
                <button onclick="openBookingModal()" 
                        class="px-9 py-4 border-2 border-white/80 hover:bg-white/10 font-semibold rounded-3xl text-sm tracking-wider transition-all">
                    BOOK YOUR APPOINTMENT
                </button>
            </div>
            
            <div class="mt-12 flex justify-center">
                <div class="flex items-center gap-x-2 text-xs tracking-[1.5px] text-white/70">
                    <i class="fa-solid fa-home"></i>
                    <span>HOME VISITS AVAILABLE ACROSS LONDON</span>
                </div>
            </div>
        </div>
        
        <!-- Scroll indicator -->
        <div class="absolute bottom-10 left-1/2 hidden md:block">
            <div class="flex flex-col items-center text-white/60 text-xs tracking-widest">
                <span>SCROLL TO DISCOVER</span>
                <i class="fa-solid fa-chevron-down mt-1 animate-bounce"></i>
            </div>
        </div>
    </header>

    <!-- (Rest of the site remains the same with updated images and no prices) -->

</body>
</html>
